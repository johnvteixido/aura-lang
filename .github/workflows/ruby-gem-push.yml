name: Ruby Gem Push

# Publishes the gem when a GitHub Release is published, or when a vX.Y.Z tag is
# pushed. Versioning is single-sourced from lib/aura/version.rb.
on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Trusted Publishing (OIDC) to RubyGems -- no stored API key
      packages: write # GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Build gem
        run: gem build aura-lang.gemspec

      # OIDC: exchanges the workflow's identity token for a short-lived RubyGems
      # key. Requires a one-time Trusted Publisher setup on rubygems.org for this
      # gem. No RUBYGEMS_API_KEY secret needed.
      - name: Configure RubyGems credentials (Trusted Publishing)
        uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0

      - name: Publish to RubyGems
        run: gem push *.gem

      - name: Publish to GitHub Packages
        run: |
          gem push --key github \
            --host https://rubygems.pkg.github.com/${{ github.repository_owner }} \
            *.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.GITHUB_TOKEN }}
